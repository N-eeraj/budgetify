<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>OTP Verification</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial;
      background-color: #0b0f0e;
    }

    .container {
      max-width: 520px;
      margin: 60px auto;
      background: #111615;
      padding: 34px;
      border-radius: 14px;
      text-align: center;
      border: 1px solid rgba(62, 207, 142, 0.15);
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    .logo {
      font-size: 18px;
      font-weight: 700;
      color: #3ecf8e;
      margin-bottom: 18px;
      letter-spacing: 0.5px;
    }

    .title {
      font-size: 22px;
      font-weight: 700;
      color: #ffffff;
      margin-bottom: 10px;
    }

    .message {
      font-size: 14px;
      color: #b7c2bd;
      line-height: 1.6;
      margin-bottom: 26px;
    }

    .otp-box {
      display: inline-block;
      padding: 16px 26px;
      font-size: 30px;
      letter-spacing: 8px;
      font-weight: 700;
      color: #3ecf8e;
      background: rgba(62, 207, 142, 0.08);
      border: 1px solid rgba(62, 207, 142, 0.35);
      border-radius: 10px;
      margin-bottom: 26px;
    }

    .footer {
      font-size: 12px;
      color: #6b7a75;
      margin-top: 18px;
    }

    .highlight {
      color: #3ecf8e;
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="logo">Your App</div>

    <div class="title">Verify your email</div>

    <div class="message">
      Use the one-time password (OTP) below to complete your sign-in.
      This code will expire shortly for security reasons.
    </div>

    <!-- Replace dynamically -->
    <div class="otp-box">{{OTP}}</div>

    <div class="message">
      If you didn’t request this, you can safely ignore this email.
    </div>

    <div class="footer">
      Powered by <span class="highlight">Supabase-style Auth</span>
    </div>
  </div>

</body>
</html>
